<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم الإرسال – مركز آل حنزاب</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --emerald: #1a6b4a;
            --emerald-light: #2d9067;
            --emerald-pale: #e8f5ef;
            --gold: #c9a84c;
            --cream: #faf8f3;
            --ink: #1c2018;
            --ink-soft: #3d4438;
            --border: #d8e8df;
            --shadow: rgba(26,107,74,0.12);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--cream);
            font-family: 'Cairo', sans-serif;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 10% 10%, rgba(26,107,74,0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 90% 80%, rgba(201,168,76,0.07) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }
        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 580px;
            width: 100%;
            margin: 30px 20px;
            text-align: center;
            background: white;
            border-radius: 20px;
            padding: 40px 30px 50px;
            box-shadow: 0 12px 40px var(--shadow);
            border: 1px solid var(--border);
            animation: fadeUp 0.6s ease both;
        }
        .logo-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 80px; height: 80px;
            background: linear-gradient(135deg, var(--emerald), var(--emerald-light));
            border-radius: 50%;
            margin: 0 auto 18px;
            box-shadow: 0 8px 30px var(--shadow);
            font-size: 36px;
        }
        h1 {
            font-family: 'Amiri', serif;
            font-size: 1.9rem;
            color: var(--emerald);
            margin-bottom: 8px;
        }
        .gold-divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0 22px;
        }
        .gold-divider::before, .gold-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(to left, transparent, var(--gold), transparent);
        }
        .gold-divider span { color: var(--gold); font-size: 1.2rem; }

        .thanks-text {
            font-size: 1.1rem;
            color: var(--ink-soft);
            line-height: 2;
            margin-bottom: 20px;
        }
        .thanks-text .emp-name {
            font-weight: 700;
            color: var(--emerald);
            font-size: 1.2rem;
        }

        .footer {
            margin-top: 30px;
            color: #8aab96;
            font-size: 0.8rem;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div class="page-wrapper">
    <div class="logo-badge">✅</div>
    <h1>تم الإرسال بنجاح</h1>
    <div class="gold-divider"><span>✦</span></div>
    <div class="thanks-text">
        شكراً لك، <span class="emp-name" id="empNameDisplay">...</span>
        <br>تم استلام رسالتك.
    </div>
    <p style="color: var(--ink-soft); font-size:0.9rem;">نشكر لك تواصلك مع المركز.</p>
    <div class="footer">مركز آل حنزاب 🌿</div>
</div>

<script>
    // Get name from URL
    const urlParams = new URLSearchParams(window.location.search);
    const empName = urlParams.get('name');
    if (empName) {
        document.getElementById('empNameDisplay').textContent = empName;
    } else {
        document.getElementById('empNameDisplay').textContent = '';
    }
</script>
</body>
</html>
